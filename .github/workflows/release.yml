name: Build and release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: main_windows_x64.exe
            v_os: windows
            v_url: https://github.com/vlang/v/releases/latest/download/v_windows.zip
            cc: msvc
            raylib_url: https://github.com/raysan5/raylib/releases/download/5.0/raylib-5.0_win64_msvc16.zip
          - os: ubuntu-latest
            artifact-name: main_linux_x64
            v_os: linux
            v_url: https://github.com/vlang/v/releases/latest/download/v_linux.zip
            cc: gcc
          - os: macos-latest
            artifact-name: main_macos_arm64
            v_os: macos
            v_url: https://github.com/vlang/v/releases/latest/download/v_macos_arm64.zip
            cc: clang

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and install V
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -L -o v.zip "${{ matrix.v_url }}"
            unzip -q v.zip -d v_install
            echo "$PWD/v_install/v" >> $GITHUB_PATH
          else
            curl -L -o v.zip "${{ matrix.v_url }}"
            sudo unzip -q v.zip -d /usr/local/v
            echo "/usr/local/v/v" >> $GITHUB_PATH
          fi
        shell: bash

      # ---- Windows: manually install raylib C library ----
      - name: Install raylib (Windows)
        if: runner.os == 'Windows'
        run: |
          curl -L -o raylib.zip "${{ matrix.raylib_url }}"
          unzip -q raylib.zip -d raylib
          echo "RAYLIB_INCLUDE=$PWD/raylib/raylib-5.0_win64_msvc16/include" >> $GITHUB_ENV
          echo "RAYLIB_LIB=$PWD/raylib/raylib-5.0_win64_msvc16/lib" >> $GITHUB_ENV
        shell: bash

      # ---- Linux: install dev libraries ----
      - name: Install raylib (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev \
            libwayland-dev libxkbcommon-dev

      # ---- macOS: install raylib ----
      - name: Install raylib (macOS)
        if: runner.os == 'macOS'
        run: brew install raylib

      # ---- Install V raylib module (all OSes) ----
      - name: Install V raylib module
        run: v install raylib
        shell: bash

      - name: Create releases directory
        run: mkdir -p releases

      - name: Build
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            v -skip-unused -cflags "-O3 -DNDEBUG -I$RAYLIB_INCLUDE" -ldflags "-s -L$RAYLIB_LIB -lraylib" \
              -os ${{ matrix.v_os }} -cc ${{ matrix.cc }} \
              -o releases/${{ matrix.artifact-name }} .
          else
            v -skip-unused -cflags "-O3 -DNDEBUG" -ldflags "-s" \
              -os ${{ matrix.v_os }} -cc ${{ matrix.cc }} \
              -o releases/${{ matrix.artifact-name }} .
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: releases/${{ matrix.artifact-name }}