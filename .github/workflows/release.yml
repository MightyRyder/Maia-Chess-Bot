name: Build and release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: main_windows_x64.exe
            v_os: windows
            v_url: https://github.com/vlang/v/releases/latest/download/v_windows.zip
            cc: msvc
            raylib_cache_key: raylib-windows
          - os: ubuntu-latest
            artifact-name: main_linux_x64
            v_os: linux
            v_url: https://github.com/vlang/v/releases/latest/download/v_linux.zip
            cc: gcc
            raylib_cache_key: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and install V
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -L -o v.zip "${{ matrix.v_url }}"
            unzip -q v.zip -d v_install
            echo "$PWD/v_install/v" >> $GITHUB_PATH
          else
            curl -L -o v.zip "${{ matrix.v_url }}"
            sudo unzip -q v.zip -d /usr/local/v
            echo "/usr/local/v/v" >> $GITHUB_PATH
          fi
        shell: bash

      - name: Cache Raylib (Windows)
        if: runner.os == 'Windows'
        id: cache-raylib-win
        uses: actions/cache@v3
        with:
          path: ~/.vmodules/cache/raylib
          key: raylib-win-${{ runner.os }}-${{ hashFiles('v.mod') }}

      - name: Install Raylib (Windows)
        if: runner.os == 'Windows' && steps.cache-raylib-win.outputs.cache-hit != 'true'
        run: v setup raylib

      - name: Install Raylib (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev \
            libwayland-dev libxkbcommon-dev

      - name: Install Raylib (macOS)
        if: runner.os == 'macOS'
        run: brew install raylib

      - name: Build
        run: |
          v -skip-unused -cflags "-O3 -DNDEBUG" -ldflags "-s" \
            -os ${{ matrix.v_os }} -cc ${{ matrix.cc }} \
            -o releases/${{ matrix.artifact-name }} .
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: releases/${{ matrix.artifact-name }}