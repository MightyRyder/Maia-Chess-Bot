name: Build and release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: main_windows_x64.exe
            v_os: windows
            v_url: https://github.com/vlang/v/releases/latest/download/v_windows.zip
            cc: gcc
            raylib_url: https://github.com/raysan5/raylib/releases/download/5.0/raylib-5.0_win64_mingw-w64.zip
            raylib_folder: raylib-5.0_win64_mingw-w64
          - os: ubuntu-latest
            artifact-name: main_linux_x64
            v_os: linux
            v_url: https://github.com/vlang/v/releases/latest/download/v_linux.zip
            cc: gcc
            raylib_url: https://github.com/raysan5/raylib/releases/download/5.0/raylib-5.0_linux_amd64.tar.gz
            raylib_folder: raylib-5.0_linux_amd64
          - os: macos-latest
            artifact-name: main_macos_arm64
            v_os: macos
            v_url: https://github.com/vlang/v/releases/latest/download/v_macos_arm64.zip
            cc: clang

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Install the V compiler ----
      - name: Download and install V
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -L -o v.zip "${{ matrix.v_url }}"
            unzip -q v.zip -d v_install
            echo "$PWD/v_install/v" >> $GITHUB_PATH
          else
            curl -L -o v.zip "${{ matrix.v_url }}"
            sudo unzip -q v.zip -d /usr/local/v
            echo "/usr/local/v/v" >> $GITHUB_PATH
          fi
        shell: bash

      # ---- Windows: install MinGW (needed for gcc) ----
      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install mingw -y
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $GITHUB_PATH
        shell: bash

      # ---- Raylib C library (same approach for Windows and Linux) ----
      - name: Download and extract raylib C library (Windows / Linux)
        if: runner.os != 'macOS'
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -L -o raylib.zip "${{ matrix.raylib_url }}"
            unzip -q raylib.zip -d raylib_c
          else
            curl -L -o raylib.tar.gz "${{ matrix.raylib_url }}"
            tar -xzf raylib.tar.gz -C raylib_c --strip-components=1
          fi
          echo "RAYLIB_INCLUDE=$PWD/raylib_c/${{ matrix.raylib_folder }}/include" >> $GITHUB_ENV
          echo "RAYLIB_LIB=$PWD/raylib_c/${{ matrix.raylib_folder }}/lib" >> $GITHUB_ENV
        shell: bash

      - name: Install raylib C (macOS)
        if: runner.os == 'macOS'
        run: brew install raylib

      # ---- Install the V raylib module ----
      - name: Install V raylib module
        run: git clone --depth 1 https://github.com/vlang/raylib.git $HOME/.vmodules/raylib
        shell: bash

      - name: Create releases directory
        run: mkdir -p releases

      # ---- Build ----
      - name: Build
        run: |
          echo "RAYLIB_INCLUDE = $RAYLIB_INCLUDE"
          echo "RAYLIB_LIB = $RAYLIB_LIB"
          if [ "$RUNNER_OS" = "Windows" ] || [ "$RUNNER_OS" = "Linux" ]; then
            v -skip-unused -cflags "-O3 -DNDEBUG -I${RAYLIB_INCLUDE}" \
              -ldflags "-s -L${RAYLIB_LIB} -lraylib" \
              -os ${{ matrix.v_os }} -cc ${{ matrix.cc }} \
              -o releases/${{ matrix.artifact-name }} .
          else
            v -skip-unused -cflags "-O3 -DNDEBUG" -ldflags "-s" \
              -os ${{ matrix.v_os }} -cc ${{ matrix.cc }} \
              -o releases/${{ matrix.artifact-name }} .
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: releases/${{ matrix.artifact-name }}